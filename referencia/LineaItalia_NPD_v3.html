<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Linea Italia · NPD Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--surface:#fff;--surface2:#f0f2f5;--border:#d8dde5;--border2:#e4e8ee;
  --text:#1a2233;--muted:#4a5568;--navy:#1a1f3c;--navy2:#2d3561;
  --ok:#1e9e5e;--warn:#c47d0a;--bad:#d93535;
  --ok-bg:rgba(30,158,94,.10);--warn-bg:rgba(196,125,10,.10);--bad-bg:rgba(217,53,53,.10);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-dark:#3C3489;
  --blue:#185FA5;--blue-bg:#E6F1FB;--amber:#854F0B;--amber-bg:#FAEEDA;--teal:#0F6E56;--teal-bg:#E1F5EE;
  --font-d:'Syne',sans-serif;--font-b:'DM Sans',sans-serif;--font-m:'DM Mono',monospace;
  --r:10px;--r2:14px;--r3:18px;--shadow:0 2px 12px rgba(26,34,51,.08);
}
html,body{height:100%;font-family:var(--font-b);font-size:14px;background:var(--bg);color:var(--text);overflow:hidden}
.shell{display:flex;height:100dvh;overflow:hidden}
/* SIDEBAR */
.sidebar{width:232px;flex:0 0 232px;background:#1a1f3c;border-right:none;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:11px}
.brand-logo{width:34px;height:34px;border-radius:6px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:0 0 34px}
.brand-h{font-family:var(--font-d);font-size:13px;font-weight:700;color:#fff;line-height:1.2}
.brand-s{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.snav{padding:8px;display:flex;flex-direction:column;gap:1px}
.snav-sec{font-size:10px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.08em;text-transform:uppercase;padding:12px 8px 4px}
.sn{all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:13px;color:rgba(255,255,255,.78);transition:background .12s,color .12s;width:100%}
.sn:hover{background:rgba(255,255,255,.15);color:#fff}
.sn.active{background:rgba(255,255,255,.22);color:#fff;font-weight:600}
.sn .ico{font-size:15px;flex:0 0 20px;text-align:center}
.sn .bdg{margin-left:auto;background:rgba(255,255,255,.25);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sn .bdg.ok{background:rgba(30,158,94,.75)}.sn .bdg.blue{background:rgba(255,255,255,.3)}
.sf{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.15)}
.sf-row{display:flex;align-items:center;gap:8px}
.sf-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex:0 0 30px;border:2px solid rgba(255,255,255,.3)}
.sf-name{font-size:12px;font-weight:600;color:#fff;line-height:1.2}
.sf-role{font-size:10px;color:rgba(255,255,255,.6)}
.sf-out{margin-left:auto;font-size:11px;color:rgba(255,255,255,.75);cursor:pointer;padding:3px 7px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:transparent;font-family:var(--font-b)}
.sf-out:hover{background:rgba(255,255,255,.18);color:#fff}
/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.ph{padding:20px 22px 0;position:sticky;top:0;z-index:10;background:var(--bg)}
.ph-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding-bottom:14px;border-bottom:1px solid var(--border2)}
.ph-h2{font-family:var(--font-d);font-size:19px;font-weight:700;margin:0;line-height:1.1}
.ph-sub{font-size:11px;color:var(--muted);margin:3px 0 0}
.ph-acts{display:flex;gap:7px;align-items:center}
.pad{padding:16px 22px}
/* KPI */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.kc{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:14px 15px;cursor:pointer;position:relative;overflow:hidden;transition:box-shadow .15s}
.kc:hover{box-shadow:var(--shadow)}
.kc::before{content:'';position:absolute;inset:0;border-radius:var(--r2);opacity:0}
.kc.ok{border-color:rgba(30,158,94,.3)}.kc.ok::before{background:var(--ok-bg);opacity:1}
.kc.warn{border-color:rgba(196,125,10,.3)}.kc.warn::before{background:var(--warn-bg);opacity:1}
.kc.bad{border-color:rgba(217,53,53,.3)}.kc.bad::before{background:var(--bad-bg);opacity:1}
.kc.blue{border-color:rgba(26,31,60,.2)}.kc.blue::before{background:rgba(26,31,60,.05);opacity:1}
.kc-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;position:relative}
.kc-val{font-family:var(--font-d);font-size:28px;font-weight:800;margin:4px 0 2px;position:relative;line-height:1}
.kc.ok .kc-val{color:var(--ok)}.kc.warn .kc-val{color:var(--warn)}.kc.bad .kc-val{color:var(--bad)}.kc.blue .kc-val{color:var(--navy)}
.kc-hint{font-size:11px;color:var(--muted);position:relative}
.kc-arr{position:absolute;bottom:12px;right:12px;font-size:11px;color:var(--muted);opacity:.5}
.sec{margin-bottom:20px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sec-title{font-family:var(--font-d);font-size:13px;font-weight:700}
.sec-link{font-size:12px;color:var(--purple);cursor:pointer;font-weight:600}
.sec-link:hover{text-decoration:underline}
/* RISK */
.ri{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:11px 14px;margin-bottom:7px;cursor:pointer;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;transition:box-shadow .12s}
.ri::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.ri.bad::before{background:var(--bad)}.ri.warn::before{background:var(--warn)}
.ri:hover{box-shadow:var(--shadow)}
.ri-name{font-size:13px;font-weight:600;margin-bottom:2px}
.ri-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:11px;color:var(--muted)}
.ri-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.dc{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
.dc.bad{background:var(--bad-bg);color:var(--bad);border:1px solid rgba(217,53,53,.25)}
.dc.warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(196,125,10,.25)}
.dc.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(30,158,94,.25)}
/* TAGS */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.tag.ok{background:var(--ok-bg);color:var(--ok);border:1px solid rgba(30,158,94,.2)}
.tag.warn{background:var(--warn-bg);color:var(--warn);border:1px solid rgba(196,125,10,.2)}
.tag.bad{background:var(--bad-bg);color:var(--bad);border:1px solid rgba(217,53,53,.2)}
.tag.gray{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.tag.purple{background:var(--purple-bg);color:var(--purple-dark);border:1px solid rgba(83,74,183,.2)}
.tag.blue{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(24,95,165,.2)}
.tag.navy{background:rgba(26,31,60,.08);color:var(--navy);border:1px solid rgba(26,31,60,.15)}
.dot{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
/* BTNS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--surface)}
.btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.btn.primary:hover{background:var(--navy2)}
.btn.ok-btn{background:var(--ok-bg);border-color:rgba(30,158,94,.3);color:var(--ok)}
.btn.danger{background:var(--bad-bg);border-color:rgba(217,53,53,.3);color:var(--bad)}
.btn.sm{padding:5px 10px;font-size:11px}
.btn.xs{padding:3px 8px;font-size:10px;border-radius:6px}
/* PROYECTO CARD simple para ingenieros */
.proj-card{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:box-shadow .12s,border-color .12s;position:relative;overflow:hidden}
.proj-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.proj-card.enc::before{background:var(--purple)}
.proj-card.term::before{background:var(--ok)}
.proj-card.risk::before{background:var(--bad)}
.proj-card:hover{box-shadow:var(--shadow);border-color:var(--border)}
.pc-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.pc-meta{font-size:11px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pc-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
/* TABLA PROYECTOS GERENTE */
.ptbl{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);overflow:hidden;margin-bottom:14px}
.ptbl-h{display:grid;grid-template-columns:60px 1fr 110px 90px 36px;padding:7px 14px;font-size:10px;color:var(--muted);font-weight:700;border-bottom:1px solid var(--border2);background:var(--surface2);text-transform:uppercase;letter-spacing:.04em}
.pt-r{display:grid;grid-template-columns:60px 1fr 110px 90px 36px;padding:10px 14px;border-bottom:1px solid var(--border2);align-items:center;cursor:pointer;transition:background .1s}
.pt-r:last-child{border-bottom:none}
.pt-r:hover{background:var(--surface2)}
.pt-id{font-size:10px;color:var(--muted);font-family:var(--font-m);background:var(--surface2);padding:2px 5px;border-radius:4px;display:inline-block}
.pt-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px}
.pt-eng{font-size:11px;color:var(--muted)}
.edot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:3px}
/* AVANCE BAR */
.av-bar{display:flex;align-items:center;gap:6px}
.av-track{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;min-width:50px}
.av-fill{height:100%;border-radius:99px}
.av-pct{font-size:11px;font-weight:700;min-width:30px;text-align:right}
/* FBAR */
.fbar{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbar select,.fbar input{font-size:12px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);font-family:var(--font-b);outline:none}
/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(26,34,51,.45);z-index:200;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r3);width:800px;max-width:98vw;margin:auto;box-shadow:0 8px 40px rgba(26,34,51,.15)}
.mh{padding:15px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mh-title{font-family:var(--font-d);font-size:16px;font-weight:700;margin:0}
.mh-sub{font-size:11px;color:var(--muted);margin:3px 0 0;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mh-x{width:26px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;flex-shrink:0;font-family:var(--font-b)}
.mh-x:hover{background:var(--surface2)}
.mtabs{display:flex;border-bottom:1px solid var(--border2);padding:0 20px;background:var(--surface2);overflow-x:auto}
.mt{font-size:12px;padding:8px 13px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;font-weight:600}
.mt.active{color:var(--navy);border-bottom-color:var(--navy)}
.mbody{padding:17px 20px;max-height:72vh;overflow-y:auto}
.mpg{display:none}.mpg.active{display:block}
/* META GRID */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.mg-i{background:var(--surface2);border-radius:var(--r);padding:9px 11px}
.mg-l{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.mg-v{font-size:13px;font-weight:600;color:var(--text)}
/* FASE CARDS */
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.fp{border-radius:var(--r2);padding:11px 13px;border:1px solid var(--border2)}
.fp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.fp-name{font-size:12px;font-weight:700}
.fp-pct{font-size:20px;font-weight:800;font-family:var(--font-d)}
.fp-sub{font-size:10px;color:var(--muted);margin-bottom:5px}
.fp-bar{height:4px;border-radius:3px;background:rgba(0,0,0,.07);overflow:hidden}
.fp-fill{height:100%;border-radius:3px}
.fp-dates{font-size:10px;color:var(--muted);margin-top:5px;display:flex;gap:6px;align-items:center}
/* PROJECT PLAN TASK ROW - con colores */
.fb-h{font-size:12px;font-weight:700;padding:6px 11px;border-radius:8px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.fb-bar{height:3px;border-radius:2px;margin-bottom:5px;overflow:hidden}
.tr{display:grid;grid-template-columns:18px 1fr 160px 78px 78px 96px;gap:3px;padding:5px 9px;font-size:11px;border:1px solid var(--border2);border-radius:5px;margin-bottom:3px;align-items:center;background:var(--surface);transition:background .1s}
.tr.done{background:#f0faf5;border-color:rgba(30,158,94,.3)}
.tr.in-prog{background:#faf9ff;border-color:rgba(83,74,183,.25)}
.tr.blocked{background:#fff5f5;border-color:rgba(217,53,53,.25)}
.tr.idle{background:var(--surface);border-color:var(--border2)}
.tr.done .tr-n{color:var(--ok)}.tr.in-prog .tr-n{color:var(--purple)}.tr.blocked .tr-n{color:var(--bad)}.tr.idle .tr-n{color:var(--text)}
.tr-sel{font-size:10px;border:1px solid var(--border);border-radius:4px;padding:2px 3px;background:var(--surface);color:var(--text);cursor:pointer;width:100%;font-family:var(--font-b)}
.tr-date{font-size:10px;border:1px solid var(--border);border-radius:4px;padding:2px 3px;background:var(--surface);color:var(--text);width:100%}
.dept{font-size:9px;color:var(--muted);background:var(--surface2);padding:2px 5px;border-radius:3px;text-align:center;white-space:normal;word-break:break-word;line-height:1.3}
.at{font-size:9px;padding:1px 5px;border-radius:5px;background:var(--blue-bg);color:var(--blue);margin-left:3px}
/* TIMELINE */
.timeline-wrap{overflow-x:auto;padding-bottom:8px}
.tl-container{min-width:700px;padding:8px 0}
.tl-row{display:flex;align-items:center;margin-bottom:8px;gap:10px}
.tl-label{font-size:11px;font-weight:700;width:100px;flex:0 0 100px;text-align:right}
.tl-track{flex:1;position:relative;height:28px;background:var(--surface2);border-radius:6px;overflow:visible}
.tl-bar{position:absolute;height:100%;border-radius:6px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;transition:opacity .15s;cursor:pointer}
.tl-bar:hover{opacity:.85}
.tl-today{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--bad);border-radius:2px;z-index:10}
.tl-today::before{content:'HOY';position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:8px;font-weight:700;color:var(--bad);white-space:nowrap}
.tl-months{display:flex;margin-left:110px;margin-bottom:4px}
.tl-month{font-size:9px;color:var(--muted);font-weight:600;text-align:center;border-left:1px solid var(--border2);padding:0 4px}
/* SKU */
.ski{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:9px 13px;margin-bottom:6px;display:grid;grid-template-columns:1fr 125px 100px 110px 26px;gap:8px;align-items:center}
.ski.sd{background:rgba(30,158,94,.05);border-color:rgba(30,158,94,.3)}
.ski.sp{background:rgba(83,74,183,.05);border-color:rgba(83,74,183,.3)}
.ski-ni{font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text);width:100%;outline:none;font-family:var(--font-b)}
.ski-ci{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:var(--surface2);color:var(--muted);width:100%;font-family:var(--font-m)}
.ski-si{font-size:11px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;background:var(--surface);color:var(--text);cursor:pointer;width:100%;font-family:var(--font-b)}
.ski-cb{font-size:10px;padding:3px 7px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);width:100%;text-align:center;font-family:var(--font-b)}
.ski-cb:hover{background:var(--surface2)}
.ski-del{font-size:11px;cursor:pointer;color:var(--muted);padding:2px 4px;border-radius:3px;text-align:center}
.ski-del:hover{background:var(--bad-bg);color:var(--bad)}
.ck-d{background:var(--surface2);border-radius:7px;padding:9px 11px;margin:-2px 0 6px}
.ck-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:5px}
.ck-i{display:flex;align-items:center;gap:5px;padding:5px 7px;background:var(--surface);border-radius:5px;border:1px solid var(--border2);cursor:pointer;font-size:11px;transition:all .1s}
.ck-i.done{background:var(--ok-bg);border-color:rgba(30,158,94,.3);color:var(--ok)}
.ck-box{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--border);flex:0 0 13px;display:flex;align-items:center;justify-content:center;font-size:8px}
.ck-i.done .ck-box{background:var(--ok);border-color:var(--ok);color:#fff}
.add-sku{width:100%;padding:8px;border:1px dashed var(--border);border-radius:var(--r2);background:transparent;color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;text-align:center;font-family:var(--font-b)}
.add-sku:hover{border-color:var(--purple);color:var(--purple);background:var(--purple-bg)}
/* NOTAS */
.nlog{max-height:110px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.ni{font-size:11px;padding:6px 9px;background:var(--surface2);border-radius:5px;color:var(--muted);line-height:1.5;border-left:2px solid var(--purple)}
.ni strong{color:var(--text)}
.n-in{width:100%;font-size:12px;border:1px solid var(--border);border-radius:var(--r);padding:7px 9px;resize:vertical;min-height:55px;background:var(--surface);color:var(--text);font-family:var(--font-b)}
/* FORM INPUT */
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:4px}
.inp{width:100%;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--r);font-size:13px;font-family:var(--font-b);outline:none}
.inp:focus{border-color:var(--purple)}
/* LOGIN */
#ls{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.lbox{width:min(400px,100%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r3);padding:28px;box-shadow:0 8px 40px rgba(26,34,51,.12)}
.l-logo{width:48px;height:48px;border-radius:11px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:17px;font-weight:800;color:#fff;margin-bottom:14px}
.lbox h2{font-family:var(--font-d);font-size:20px;font-weight:700;margin:0 0 3px}
.lbox p{font-size:13px;color:var(--muted);margin:0 0 20px}
.l-err{color:var(--bad);font-size:12px;margin-top:8px;font-weight:600;display:none}
/* ADMIN USERS */

tbody tr:hover td{background:var(--surface2)}

const pd   = s => {if(!s)return null;const[y,m,d]=s.split('-');return new Date(+y,+m-1,+d)};

function mkTareas(f){return FD[f].tareas.map((t,i)=>({...t,e:'No iniciado',ini:'',fin:'',id:i}));}
function mkProj(r){
  const tp={};
  FK.forEach(f=>{
    const fi=FK.indexOf(f),ci=FK.indexOf(r.fase),t=mkTareas(f);
    if(fi<ci)t.forEach(x=>x.e='Completado');
    else if(fi===ci){const d=Math.round(t.length*r.avance/100);t.forEach((x,i)=>{x.e=i<d?'Completado':i===d&&d<t.length?'En progreso':'No iniciado';});}
    tp[f]=t;
  });
  const gates={};Object.keys(GATES).forEach(gk=>{gates[gk]={items:new Array(GATES[gk].items.length).fill(false),aprobado:false,f:''};});
  return{...r,tp,skus:r.skus||[],notas:[],aprob:{g:{s:'pendiente',f:''}},gates,act:[],tareasSemana:[],lu:new Date().toISOString()};
}
function fpct(p,f){const t=p.tp[f]||[];return t.length?Math.round(t.filter(x=>x.e==='Completado').length/t.length*100):0;}
function ckpct(sk){return Math.round(CK.filter(c=>sk.checks[c]).length/CK.length*100);}
function rcAvance(p){
  const all=Object.values(p.tp).flat();
  if(!all.length) return;
  p.avance=Math.round(all.filter(t=>t.e==='Completado').length/all.length*100);

  // ── Calcular fase activa correctamente ──────────────────────────
  // Regla: la fase activa es la primera fase que tiene al menos una tarea NO completada.
  // Si TODAS las fases están al 100%, la fase activa es la última (Seguimiento).
  // Seguimiento siempre es la fase final — si todo lo anterior está completo, Seguimiento es activa.
  let faseActual = FK[FK.length-1]; // default: última fase
  for(let i=0; i<FK.length; i++){
    const f = FK[i];
    const ts = p.tp[f]||[];
    if(ts.length && ts.some(t=>t.e!=='Completado')){
      faseActual = f;
      break;
    }
  }
  p.fase = faseActual;

  // ── Guardar inmediatamente ───────────────────────────────────────
  saveProj(p);
}

// Auto-fechas por fase basadas en project plan
function getFaseDates(p, f){
  const ts = p.tp[f]||[];
  // Read new fi/ff fields first, fallback to legacy ini/fin
  const inis = ts.map(t=>t.fi||t.ini).filter(Boolean).map(s=>typeof s==='string'?pd(s):s).filter(Boolean);
  const fins = ts.map(t=>t.ff||t.fin).filter(Boolean).map(s=>typeof s==='string'?pd(s):s).filter(Boolean);
  if(!inis.length && !fins.length) return {ini:null, fin:null};
  const ini = inis.length ? new Date(Math.min(...inis.map(d=>d instanceof Date?d.getTime():new Date(d).getTime()))) : null;
  const fin = fins.length ? new Date(Math.max(...fins.map(d=>d instanceof Date?d.getTime():new Date(d).getTime()))) : null;
  return {ini, fin};
}
function toISO(d){if(!d)return'';const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return`${y}-${m}-${dd}`;}

function saveProj(p){try{p.lu=new Date().toISOString();localStorage.setItem(VER+p.id,JSON.stringify(p));autoBackup();}catch(e){}}
function autoBackup(){try{const keys=Object.keys(localStorage).filter(k=>k.startsWith(VER));const data={ts:new Date().toISOString(),v:VER,items:{}};keys.forEach(k=>{try{data.items[k]=JSON.parse(localStorage.getItem(k));}catch(e){}});localStorage.setItem('li_autobackup',JSON.stringify(data));}catch(e){}}
function saveUsers(){try{localStorage.setItem(VER+'users',JSON.stringify(USERS));}catch(e){}}
function loadAll(){
  try{
    const usaved = localStorage.getItem(VER+'users');
    if(usaved){
      const saved = JSON.parse(usaved);
      // Merge: keep saved users but always ensure DEFAULT_USERS entries exist
      // (adds new area profiles if they weren't in the saved list)
      const merged = JSON.parse(JSON.stringify(DEFAULT_USERS));
      saved.forEach(su=>{
        const idx=merged.findIndex(m=>m.uid===su.uid);
        if(idx>=0) merged[idx]={...merged[idx],...su}; // update existing
        else merged.push(su); // add custom users not in defaults
      });
      USERS = merged;
    } else {
      USERS = JSON.parse(JSON.stringify(DEFAULT_USERS));
    }
    saveUsers(); // persist the merged list
    // Load deleted list
    const deleted = JSON.parse(localStorage.getItem(VER+'__deleted')||'[]');
    PROJ = RAW
      .filter(r=>!deleted.includes(r.id))
      .map(r=>{const s=localStorage.getItem(VER+r.id);if(s){try{const p=JSON.parse(s);if(!p.aprob||!p.aprob.g)p.aprob={g:{s:'pendiente',f:''}};return p;}catch(e){}}return mkProj(r);});
    // Also load any extra projects not in RAW (created dynamically)
    Object.keys(localStorage).forEach(k=>{
      if(k.startsWith(VER)&&k!==VER+'users'&&k!==VER+'__deleted'){
        const id=k.replace(VER,'');
        if(!RAW.find(r=>r.id===id)&&!deleted.includes(id)){
          try{const p=JSON.parse(localStorage.getItem(k));if(p&&p.id)PROJ.push(p);}catch(e){}
        }
      }
    });
  }catch(e){PROJ=RAW.map(mkProj);USERS=JSON.parse(JSON.stringify(DEFAULT_USERS));}
  // ── Auto-corregir fase y avance en todos los proyectos al cargar ──
  PROJ.forEach(p=>{
    if(!p.tp) return;
    const all=Object.values(p.tp).flat();
    if(!all.length) return;
    // Recalcular avance
    const newAvance=Math.round(all.filter(t=>t.e==='Completado').length/all.length*100);
    // Recalcular fase activa
    let faseActual=FK[FK.length-1];
    for(let i=0;i<FK.length;i++){
      const f=FK[i];
      const ts=p.tp[f]||[];
      if(ts.length&&ts.some(t=>t.e!=='Completado')){faseActual=f;break;}
    }
    // Solo guardar si cambió algo para no generar ruido
    if(p.avance!==newAvance||p.fase!==faseActual){
      p.avance=newAvance;
      p.fase=faseActual;
      try{localStorage.setItem(VER+p.id,JSON.stringify(p));}catch(e){}
    }
  });
}

// ─── MIS PROYECTOS (ingeniero) ───────────────────────────────────────
function rMisProyectos(c, filtro){
  filtro = filtro || window._mpFiltro || 'curso';
  window._mpFiltro = filtro;

  const mis   = PROJ.filter(p=>p.eng===cu?.perfil);
  const enc   = mis.filter(p=>p.estatus!=='Terminado'&&p.estatus!=='Cancelado');
  const term  = mis.filter(p=>p.estatus==='Terminado');
  const canc  = mis.filter(p=>p.estatus==='Cancelado');
  const rk    = enc.filter(p=>{const d=dN(p.fechaFase,p.estatus);return d!==null&&d<=7;});
  const avg   = mis.length?Math.round(mis.reduce((s,p)=>s+p.avance,0)/mis.length):0;

  // Lista a mostrar según filtro
  let lista = [];
  if(filtro==='curso')   lista = enc;
  else if(filtro==='riesgo') lista = rk;
  else if(filtro==='todos')  lista = mis.filter(p=>p.estatus!=='Cancelado');

  // ── KPI strip ──
  let h=`<div class="kpi-strip">
    <div class="kc blue" style="cursor:pointer" onclick="rMisProyectos(document.getElementById('vc'),'curso')">
      <div class="kc-lbl">En curso</div><div class="kc-val">${enc.length}</div><div class="kc-hint">proyectos activos</div>
    </div>
    <div class="kc ok">
      <div class="kc-lbl">Terminados</div><div class="kc-val">${term.length}</div><div class="kc-hint">completados</div>
    </div>
    <div class="kc${rk.length>0?' bad':' ok'}" style="cursor:pointer" onclick="rMisProyectos(document.getElementById('vc'),'riesgo')">
      <div class="kc-lbl">En riesgo</div><div class="kc-val">${rk.length}</div><div class="kc-hint">entrega ≤ 7 días</div>
    </div>
    <div class="kc blue">
      <div class="kc-lbl">Avance promedio</div><div class="kc-val">${avg}%</div><div class="kc-hint">de todos mis proyectos</div>
    </div>
  </div>`;

  // ── Filtro tabs interactivos ──
  const tabs = [
    {k:'curso',  l:`En curso (${enc.length})`,   col:'var(--purple)'},
    {k:'riesgo', l:`En riesgo (${rk.length})`,   col:'var(--bad)'},
    {k:'todos',  l:`Todos (${mis.filter(p=>p.estatus!=='Cancelado').length})`, col:'var(--navy)'},
  ];
  h+=`<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:16px;flex-wrap:wrap">
    <div style="display:flex;gap:6px;flex-wrap:wrap">
    ${tabs.map(t=>`
      <button onclick="rMisProyectos(document.getElementById('vc'),'${t.k}')"
        style="padding:6px 16px;border-radius:99px;border:2px solid ${filtro===t.k?t.col:'var(--border)'};
               background:${filtro===t.k?t.col:'var(--surface)'};
               color:${filtro===t.k?'#fff':'var(--text)'};
               font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;font-family:var(--font-b)">
        ${t.l}
      </button>`).join('')}
    </div>
    <button onclick="nuevoProyecto()" style="padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-b);white-space:nowrap">＋ Nuevo proyecto</button>
  </div>`;

  // ── Lista filtrada ──
  if(!lista.length){
    h+=`<div style="text-align:center;padding:40px 20px;color:var(--muted);background:var(--surface2);border-radius:var(--r2)">
      <div style="font-size:28px;margin-bottom:8px">📋</div>
      <div style="font-size:13px;font-weight:600">Sin proyectos en esta categoría</div>
    </div>`;
  } else {
    lista.forEach(p=>{
      const d=dN(p.fechaFase,p.estatus);
      const isRisk=d!==null&&d<=7;
      const isTerm=p.estatus==='Terminado';
      const cardCls=isTerm?'proj-card term':isRisk?'proj-card risk':'proj-card enc';
      // Barra de avance
      const avPct=p.avance||0;
      h+=`<div class="${cardCls}" onclick="oP('${p.id}')" style="margin-bottom:8px">
        <div style="flex:1;min-width:0">
          <div class="pc-name">${p.name}</div>
          <div class="pc-meta" style="margin-top:3px">
            ${fT(p.fase)}
            ${p.fechaFinal?`<span>·</span> <span style="font-size:10px">${fmtD(p.fechaFinal)}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;margin-top:7px">
            <div style="flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${avPct}%;background:${bC(avPct)};border-radius:3px"></div>
            </div>
            <span style="font-size:10px;font-weight:700;color:${bC(avPct)};min-width:32px;text-align:right">${avPct}%</span>

          <span class="tag ${sC(p.estatus)}">${sL(p.estatus)}</span>
          ${dChip(p.fechaFase,p.estatus)}
        </div>
      </div>`;
    });
  }

  // Cancelados siempre al final colapsados
  if(canc.length){
    h+=`<details style="margin-top:12px">
      <summary style="font-size:11px;color:var(--muted);cursor:pointer;padding:6px 10px;background:var(--surface2);border-radius:var(--r);list-style:none">
        ✕ Cancelados (${canc.length})
      </summary>
      <div style="margin-top:5px">
        ${canc.map(p=>`<div class="proj-card term" style="opacity:.6;margin-bottom:5px" onclick="oP('${p.id}')">
          <div style="flex:1"><div class="pc-name" style="text-decoration:line-through">${p.name}</div>
          <div class="pc-meta"><span class="tag gray">✕ Cancelado${p.canceladoFecha?' · '+p.canceladoFecha:''}</span></div></div>
        </div>`).join('')}
      </div>
    </details>`;
  }

  if(!mis.length) h=`<div style="text-align:center;padding:40px;color:var(--muted)">No tienes proyectos asignados.</div>`;
  c.innerHTML=h;
}

// ─── REPORTE EJECUTIVO (DASHBOARD STYLE) ────────────────────────────
function rReporte(c){
  const engU=USERS.filter(u=>u.perfil!=='GI');
  const d=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const filterVal=document.getElementById('rep-eng-sel')?.value||'todos';
  const filterEst=document.getElementById('rep-est-sel')?.value||'activos';

  let h=`<div style="background:var(--navy);border-radius:var(--r2);padding:12px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px">
    <div><div style="font-family:var(--font-d);font-size:14px;font-weight:700;color:#fff">Reporte ejecutivo · Gerencia de Innovación y Diseño</div><div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">Linea Italia · NPD Manager</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="rep-eng-sel" style="font-size:12px;padding:5px 9px;border:none;border-radius:var(--r);background:rgba(255,255,255,.15);color:#fff;font-family:var(--font-b);outline:none;cursor:pointer" onchange="rReporte(document.getElementById('vc'))">
        <option value="todos" style="color:#1a2233;background:#fff" ${filterVal==='todos'?'selected':''}>Todos los ingenieros</option>
        ${engU.map(u=>`<option value="${u.perfil}" style="color:#1a2233;background:#fff" ${filterVal===u.perfil?'selected':''}>${u.nombre}</option>`).join('')}
      </select>
      <select id="rep-est-sel" style="font-size:12px;padding:5px 9px;border:none;border-radius:var(--r);background:rgba(255,255,255,.15);color:#fff;font-family:var(--font-b);outline:none;cursor:pointer" onchange="rReporte(document.getElementById('vc'))">
        <option value="activos" style="color:#1a2233;background:#fff" ${filterEst==='activos'?'selected':''}>Solo activos</option>
        <option value="todos" style="color:#1a2233;background:#fff" ${filterEst==='todos'?'selected':''}>Todos los proyectos</option>
      </select>
      <button onclick="imprimirReporteEjecutivo()" style="font-size:11px;font-weight:700;padding:5px 12px;border-radius:var(--r);border:1.5px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-family:var(--font-b)">🖨 Imprimir reporte</button>
      <span style="font-size:11px;color:rgba(255,255,255,.5)">${d}</span>
    </div>
  </div>`;

  // Determine scope
  const selEng = filterVal==='todos'?null:filterVal;
  const baseProj = selEng ? PROJ.filter(p=>p.eng===selEng) : PROJ;
  const projScope = filterEst==='activos' ? baseProj.filter(p=>p.estatus!=='Terminado') : baseProj;
  const actScope = projScope.filter(p=>p.estatus!=='Terminado');

  // ── KPI PANEL ──
  const term=projScope.filter(p=>p.estatus==='Terminado').length;
  const enL=actScope.filter(p=>p.estatus==='En linea').length;
  const fueraL=actScope.filter(p=>p.estatus==='Fuera de linea').length;

    h+=`<div class="sec"><div class="sec-head"><div class="sec-title">Pendientes de aprobación (${pend.length})</div></div>`;

            <span class="tag warn">Pendiente</span>
            ${isG()?`<button class="btn sm ok-btn" onclick="aprobar('${p.id}')">✓ Dar aprobación</button>`:''}
          </div>
          <div style="display:flex;gap:8px">
            <button class="btn sm" onclick="oP('${p.id}')">Ver proyecto →</button>

          </div>
        </div>
      </div>`;
    });

  if(aprobados.length){

    aprobados.forEach(p=>{

    h+=`</div>`;
  }
  if(!pend.length&&!aprobados.length) h=`<div style="text-align:center;padding:40px;color:var(--muted)">Sin proyectos pendientes o aprobados.</div>`;
  c.innerHTML=h;
}

function aprobar(pid){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  const f=TODAY.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  p.aprob={g:{s:'aprobado',f}};
  addAct(p,'aprobacion',`Aprobado por Gerencia de Innovación`);
  saveProj(p);toast('Aprobación registrada ✓');
  rAprobaciones(document.getElementById('vc'));
}

function guardarNuevoProyecto(){
  const id=(document.getElementById('np-id')?.value||'').trim().toUpperCase().replace(/\s/g,'');
  const name=(document.getElementById('np-name')?.value||'').trim();
  const eng=document.getElementById('np-eng')?.value||'RB';
  const fecha=document.getElementById('np-fecha')?.value||'';
  const estatus=document.getElementById('np-estatus')?.value||'En linea';
  const cat=document.getElementById('np-cat')?.value||'';
  const desc=(document.getElementById('np-desc')?.value||'').trim();
  if(!id){toast('El ID es obligatorio');document.getElementById('np-id')?.focus();return;}
  if(!name){toast('El nombre es obligatorio');document.getElementById('np-name')?.focus();return;}
  if(!fecha){toast('La fecha objetivo es obligatoria');return;}
  if(PROJ.find(p=>p.id===id)){toast(`Ya existe el proyecto "${id}". Elige otro ID.`);return;}
  const raw={id,name,eng,fechaFinal:fecha,avance:0,estatus,fase:'Diseño',fechaFase:fecha,skus:[]};
  const proj=mkProj(raw);
  proj.categoria=cat;
  if(desc) proj.notas=[{fecha:new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}),autor:cu?.nombre||'Sistema',texto:desc}];
  addAct(proj,'creacion',`Proyecto creado por ${cu?.nombre||'Sistema'}`);
  PROJ.push(proj);saveProj(proj);cM2();
  toast(`Proyecto "${name}" creado ✓`);
  setTimeout(()=>{sv2(isG()?'proyectos':'mis-proyectos');setTimeout(()=>oP(id),300);},200);
}

// ─── TIMELINE BUILDER ────────────────────────────────────────────────
function buildTimeline(p){
  const phases=FK.map(f=>{const {ini,fin}=getFaseDates(p,f);return{f,ini,fin,fd:FD[f]};}).filter(x=>x.ini||x.fin);
  if(!phases.length) return`<div style="padding:14px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--muted)">Agrega fechas en el Project Plan para ver la línea de tiempo.</div>`;

  const allDates=[...phases.filter(x=>x.ini).map(x=>x.ini),...phases.filter(x=>x.fin).map(x=>x.fin),TODAY];
  const minD=new Date(Math.min(...allDates.map(d=>d.getTime())));
  const maxD=new Date(Math.max(...allDates.map(d=>d.getTime())));
  // Añadir margen
  minD.setDate(minD.getDate()-14);maxD.setDate(maxD.getDate()+14);
  const totalMs=maxD-minD;
  const pct=d=>Math.max(0,Math.min(100,((d-minD)/totalMs)*100));
  const todayPct=pct(TODAY);

  // Generar meses para eje
  const months=[];let cur=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(cur<=maxD){months.push({d:new Date(cur),p:pct(new Date(cur))});cur.setMonth(cur.getMonth()+1);}

  let html=`<div class="timeline-wrap"><div class="tl-container">`;
  // Eje de meses
  html+=`<div style="position:relative;height:18px;margin-left:110px;margin-bottom:4px">`;
  months.forEach(m=>{html+=`<div style="position:absolute;left:${m.p}%;font-size:9px;color:var(--muted);font-weight:600;transform:translateX(-50%)">${m.d.toLocaleDateString('es-MX',{month:'short',year:'2-digit'})}</div>`;});
  html+=`</div>`;

  // Rows por fase
  phases.forEach(({f,ini,fin,fd})=>{
    const startPct=ini?pct(ini):0;const endPct=fin?pct(fin):startPct+5;
    const width=Math.max(1,endPct-startPct);
    const ts=p.tp[f]||[];const dn=ts.filter(t=>t.e==='Completado').length;const pt=ts.length?Math.round(dn/ts.length*100):0;
    html+=`<div class="tl-row">
      <div class="tl-label" style="color:${fd.tc}">${f}</div>
      <div class="tl-track">
        <div class="tl-today" style="left:${todayPct}%"></div>
        <div class="tl-bar" style="left:${startPct}%;width:${width}%;background:${fd.c};opacity:${pt===0?0.4:1}" title="${f}: ${ini?fmtD(toISO(ini)):'?'} → ${fin?fmtD(toISO(fin)):'?'} · ${pt}%">
          ${width>6?`${pt}%`:''}
        </div>
        ${pt>0&&pt<100?`<div style="position:absolute;left:${startPct+(endPct-startPct)*pt/100}%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.6);border-radius:1px"></div>`:''}
      </div>
    </div>`;
  });

  // Línea de hoy
  html+=`</div></div>`;
  return html;
}

// ─── REPORTE EJECUTIVO IMPRIMIBLE ──────────────────────────────────────
function imprimirReporteEjecutivo(){
  const engU=USERS.filter(u=>u.perfil!=='GI');
  const fv=document.getElementById('rep-eng-sel')?.value||'todos';
  const fe=document.getElementById('rep-est-sel')?.value||'activos';
  const selEng=fv==='todos'?null:fv;
  const base=selEng?PROJ.filter(p=>p.eng===selEng):PROJ;
  const scope=fe==='activos'?base.filter(p=>p.estatus!=='Terminado'):base;
  const fecha=new Date().toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const fc=new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});

  function pSalud(p){
    if(p.estatus==='Terminado') return{ico:'✅',col:'#4ade80',lbl:'Terminado'};
    const d=dN(p.fechaFase,p.estatus);
    if(d===null) return{ico:'⚪',col:'#9ca3af',lbl:'Sin fecha'};
    if(d<0) return{ico:'🔴',col:'#f87171',lbl:Math.abs(d)+'d venc.'};
    if(d<=7) return{ico:'🟠',col:'#fb923c',lbl:d+'d'};
    if(d<=21) return{ico:'🟡',col:'#fbbf24',lbl:d+'d'};
    return{ico:'🟢',col:'#4ade80',lbl:d+'d'};
  }
  function pMS(p){
    for(const fk of FK){
      const{fin}=getFaseDates(p,fk);
      if(p.fase===fk){
        const pend=(p.tp[fk]||[]).find(t=>t.e!=='Completado'&&(t.ff||t.fin));
        if(pend) return{fase:fk,tarea:pend.n,fecha:pend.ff||pend.fin,tipo:'tarea'};
        if(fin) return{fase:fk,tarea:'Entrega '+fk,fecha:toISO(fin),tipo:'fase'};
      }
    }
    if(p.fechaFase) return{fase:p.fase,tarea:'Entrega '+p.fase,fecha:p.fechaFase,tipo:'fase'};
    return null;
  }

  const act=scope.filter(p=>p.estatus!=='Terminado');
  const term=scope.filter(p=>p.estatus==='Terminado').length;
  const venc=act.filter(p=>{const d=dN(p.fechaFase,p.estatus);return d!==null&&d<0;}).length;
  const avg=act.length?Math.round(act.reduce((s,p)=>s+p.avance,0)/act.length):0;
  const engs=selEng?[USERS.find(u=>u.perfil===selEng)].filter(Boolean):engU;

  // Mismos colores de tags que en pantalla
  const tC={'En linea':'#1e9e5e','En pausa':'#c47d0a','Fuera de linea':'#d93535','Terminado':'#185FA5'};
  const tB={'En linea':'rgba(30,158,94,.15)','En pausa':'rgba(196,125,10,.15)','Fuera de linea':'rgba(217,53,53,.15)','Terminado':'rgba(24,95,165,.15)'};
  const tT={'En linea':'En línea','En pausa':'En pausa','Fuera de linea':'Fuera de línea','Terminado':'Terminado'};

  // Colores de fase iguales que en pantalla
  const faseStyle={
    'Diseño':       {bg:'rgba(83,74,183,.18)',   tc:'#534AB7'},
    'Desarrollo':   {bg:'rgba(24,95,165,.18)',   tc:'#185FA5'},

    const ckd=CK.filter(c=>sk.checks[c]).length;

      <td style="padding:6px 10px;border-bottom:1px solid #e5e7eb">${sk.nombre}</td>

// ─── MODAL ACTIONS ───────────────────────────────────────────────────
function aprobarModal(pid){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  const f=TODAY.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  p.aprob={g:{s:'aprobado',f}};addAct(p,'aprobacion','Aprobado por Gerencia de Innovación');
  saveProj(p);toast('Aprobación registrada ✓');rModal();sMT('gates');
}
function uf(pid,k,v){const p=PROJ.find(x=>x.id===pid);if(!p||!cE(p))return;p[k]=v;addAct(p,'tarea',`Cambió ${k} → "${v}"`);sch(p);}
function uT(pid,f,i,k,v){
  const p=PROJ.find(x=>x.id===pid);if(!p||!cE(p))return;
  p.tp[f][i][k]=v;
  if(k==='e'){
    rcAvance(p); // rcAvance ya llama saveProj internamente
    addAct(p,'tarea',`${f} · "${p.tp[f][i].n}" → ${v}`);
    saveProj(p); // guardar inmediatamente
    setTimeout(()=>{rModalKeepScroll('tareas');},60);
  } else {
    sch(p);
  }
}
function aSku(pid){const p=PROJ.find(x=>x.id===pid);if(!p||!cE(p))return;p.skus=p.skus||[];p.skus.push({id:'s'+Date.now(),nombre:`Modelo ${p.skus.length+1}`,codigo:'',e:'Pendiente',checks:Object.fromEntries(CK.map(c=>[c,false])),ckOpen:false});addAct(p,'tarea','Agregó nuevo SKU');sch(p);rModal();sMT('skus');}
function dSku(pid,sid){const p=PROJ.find(x=>x.id===pid);if(!p||!cE(p))return;const sk=p.skus.find(s=>s.id===sid);if(!confirm(`¿Eliminar "${sk?.nombre}"?`))return;p.skus=p.skus.filter(s=>s.id!==sid);sch(p);rModal();sMT('skus');}

// ─── GATE FUNCTIONS ──────────────────────────────────────────────────
function tGate(pid,gk,idx){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  if(!p.gates)p.gates={};if(!p.gates[gk])p.gates[gk]={items:new Array(GATES[gk].items.length).fill(false),aprobado:false,f:''};
  if(p.gates[gk].aprobado)return;
  p.gates[gk].items[idx]=!p.gates[gk].items[idx];
  sch(p);rModalKeepScroll('gates');
}
function aprobarGate(pid,gk){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  const f=TODAY.toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'});
  p.gates[gk].aprobado=true;p.gates[gk].f=f;
  addAct(p,'gate',`${gk} aprobado`);sch(p);toast(`${gk} aprobado ✓`);rModalKeepScroll('gates');
}
function reabrirGate(pid,gk){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  if(!confirm(`¿Reabrir ${gk}?`))return;
  p.gates[gk].aprobado=false;p.gates[gk].f='';
  sch(p);toast(`${gk} reabierto`);rModalKeepScroll('gates');
}

// ─── COMPLETAR FASE COMPLETA CON UN CLICK ────────────────────────────
function completarFase(pid,fase){
  const p=PROJ.find(x=>x.id===pid);if(!p||(!cE(p)&&!isG()))return;
  if(!confirm(`¿Marcar TODAS las tareas de "${fase}" como Completado?`))return;
  const hoy=TODAY.toISOString().slice(0,10);
  (p.tp[fase]||[]).forEach(t=>{
    t.e='Completado';
    if(!t.ff) t.ff=hoy;
    if(!t.fi) t.fi=t.ff;
  });
  rcAvance(p);
  addAct(p,'fase',`Fase "${fase}" completada con un click por ${cu?.nombre||'?'}`);
  saveProj(p);
  toast(`✓ Fase "${fase}" completada al 100%`);
  rModalKeepScroll('tareas');
}

// ─── COMPLETAR CHECKLIST SKU CON UN CLICK ────────────────────────────
function completarChecklist(pid,sid){
  const p=PROJ.find(x=>x.id===pid);if(!p||!cE(p))return;
  const sk=p.skus.find(s=>s.id===sid);if(!sk)return;
  if(!confirm(`¿Marcar todos los entregables de "${sk.nombre}" como completados?`))return;
  CK.forEach(col=>{ sk.checks[col]=true; });
  sk.e='Completado';
  addAct(p,'tarea',`SKU "${sk.nombre}" — checklist completado al 100%`);
  sch(p);
  toast(`✓ Checklist de "${sk.nombre}" completado`);
  rModal();sMT('skus');
}

function guardarTareaS(pid){

    .diag-task-num{position:absolute;top:-8px;left:-8px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;box-shadow:0 1px 4px rgba(0,0,0,.25)}
    .diag-gate{border-radius:10px;padding:11px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-top:12px;border:2px solid;transition:all .15s}
    .diag-gate:hover{transform:translateX(4px);box-shadow:0 3px 14px rgba(0,0,0,.1)}
    .diag-diamond{width:46px;height:46px;transform:rotate(45deg);display:flex;align-items:center;justify-content:center;flex:0 0 46px;border-radius:5px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
    .diag-diamond-inner{transform:rotate(-45deg);font-size:9px;font-weight:800;text-align:center;line-height:1.1}
    .tooltip-box{position:fixed;z-index:9999;background:#1a2233;color:#fff;padding:13px 16px;border-radius:11px;font-size:12px;max-width:330px;line-height:1.6;pointer-events:none;opacity:0;transition:opacity .18s;box-shadow:0 8px 32px rgba(0,0,0,.3)}
  </style>
  <div class="tooltip-box" id="diag-tt"></div>
  <div id="diag-wrap">`;

  FASES_D.forEach((f,fi)=>{
    h+=`<div class="diag-fase" style="border-color:${f.color}30;background:${f.bg}">
      <div class="diag-fase-hd" onclick="toggleFase('df-${f.id}')" style="background:${f.bg}">
        <div class="diag-num" style="background:${f.color}">${f.num}</div>
        <div style="flex:1">
          <div style="font-family:var(--font-d);font-size:15px;font-weight:800;color:${f.color}">${f.nombre}</div>
          <div style="font-size:11px;color:${f.tc};margin-top:2px;opacity:.85">${f.desc}</div>
        </div>
        <div style="font-size:22px;margin-right:4px">${f.icono}</div>
        <div style="font-size:20px;color:${f.color};font-weight:700;transition:transform .25s" id="df-arr-${f.id}">▾</div>
      </div>
      <div class="diag-fase-body" id="df-${f.id}">`;

    f.tareas.forEach((row,ri)=>{
      h+=`<div class="diag-row">`;
      row.forEach((t,ti)=>{
        taskCounter++;
        const dept=TASK_DEPT[t]||'ING. PRODUCTO';
        const safeT=t.replace(/'/g,"\\'").replace(/"/g,'&quot;');
        const safeDept=dept.replace(/'/g,"\\'").replace(/"/g,'&quot;');
        h+=`<div class="diag-task" style="border-color:${f.color}55" onmouseenter="showTT2(event,'${f.nombre}','${safeT}','${f.color}','${safeDept}')" onmouseleave="hideTT()">
          <div class="diag-task-num" style="background:${f.color}">${taskCounter}</div>
          ${t}
        </div>`;
        if(ti<row.length-1) h+=arrowH(f.color);
      });
      h+=`</div>`;
      // Between rows: turn arrow if not last row
      if(ri<f.tareas.length-1) h+=arrowTurn(f.color);
    });

    // Single gate per phase
    const g=f.gate;
    h+=`<div class="diag-gate" style="background:${f.color}12;border-color:${f.color}55" onmouseenter="showTTGate(event,'${g.n}','${g.sub}','${g.q}','${f.color}')" onmouseleave="hideTT()">
      <div class="diag-diamond" style="background:${f.color}">
        <div class="diag-diamond-inner" style="color:#fff;font-size:10px;font-weight:800">${g.n}</div>
      </div>
      <div style="flex:1">
        <div style="font-size:13px;font-weight:800;color:${f.color}">${g.n} – ${g.sub}</div>
        <div style="font-size:11px;color:${f.tc};margin-top:2px;opacity:.85">${g.q}</div>
      </div>
      <div style="font-size:22px">🔒</div>
    </div>`;

    h+=`</div></div>`;

    // Between phases: thick vertical arrow
    if(fi<FASES_D.length-1) h+=arrowV('#4a5568');
  });

  h+=`<div style="text-align:center;margin-top:16px"><div style="display:inline-block;background:var(--navy);color:#fff;padding:11px 32px;border-radius:30px;font-family:var(--font-d);font-size:14px;font-weight:700;box-shadow:0 3px 12px rgba(26,31,60,.3)">🏁 FIN DEL PROCESO</div></div>`;
  h+=`</div>`;
  c.innerHTML=h;
}

function toggleFase(id){
  const el=document.getElementById(id);
  const arr=document.getElementById(id.replace('df-','df-arr-'));
  if(!el)return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'block';
  if(arr)arr.style.transform=open?'rotate(-90deg)':'rotate(0deg)';
}

function showTTGate(e,gn,gs,gq,color){

function moveTT(e){
  const tt=document.getElementById('diag-tt');
  const x=Math.min(e.clientX+15,window.innerWidth-340);
  const y=Math.min(e.clientY+15,window.innerHeight-150);
  tt.style.left=x+'px';tt.style.top=y+'px';
  document.onmousemove=function(ev){
    const nx=Math.min(ev.clientX+15,window.innerWidth-340);
    const ny=Math.min(ev.clientY+15,window.innerHeight-150);
    tt.style.left=nx+'px';tt.style.top=ny+'px';
  };
}
function hideTT(){const tt=document.getElementById('diag-tt');tt.style.opacity='0';document.onmousemove=null;}

function exportarDatos(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith(VER));
    if(!keys.length){toast('No hay datos guardados aún');return;}
    const datos={};keys.forEach(k=>{datos[k]=localStorage.getItem(k);});
    const json=JSON.stringify(datos,null,2);
    const blob=new Blob([json],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const fecha=new Date().toISOString().slice(0,10);
    a.href=url;a.download=`LineaItalia_NPD_respaldo_${fecha}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast(`Respaldo descargado — ${keys.length} registros ✓`);
  }catch(e){toast('Error al exportar: '+e.message);}
}

function importarDatos(input){
  const file=input.files[0];if(!file)return;
  const status=document.getElementById('import-status');
  status.textContent='Leyendo archivo...';status.style.color='var(--muted)';
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const datos=JSON.parse(e.target.result);
      const keys=Object.keys(datos).filter(k=>k.startsWith(VER));
      if(!keys.length){status.textContent='❌ Archivo inválido: no contiene datos de Linea Italia NPD';status.style.color='var(--bad)';return;}
      if(!confirm(`¿Importar ${keys.length} registros?\n\nEsto reemplazará los datos actuales en este navegador. Se recomienda exportar primero un respaldo.`)){status.textContent='Importación cancelada';return;}
      keys.forEach(k=>{localStorage.setItem(k,datos[k]);});
      status.textContent=`✓ ${keys.length} registros restaurados correctamente`;
      status.style.color='var(--ok)';
      toast('Respaldo importado exitosamente ✓');
      setTimeout(()=>{loadAll();sv2('inicio');},1200);
    }catch(err){status.textContent='❌ Error al leer el archivo: '+err.message;status.style.color='var(--bad)';}
  };
  reader.readAsText(file);
}

function limpiarDatos(){
  if(!confirm('¿Seguro que deseas borrar TODOS los datos?\n\nEsta acción no se puede deshacer. Exporta un respaldo primero.'))return;

// ─── AUTOCOMPLETAR FECHAS HACIA ATRÁS (HISTÓRICO) ────────────────────
function aplicarFechasHaciaAtras(pid){
  const p=PROJ.find(x=>x.id===pid);
  if(!p){toast('Proyecto no encontrado');return;}
  if(!cE(p)&&!isG()){toast('Sin permiso de edición');return;}

  const launchInput=document.getElementById(`launch-date-${pid}`);
  const launchDate=launchInput?.value;
  if(!launchDate){toast('Ingresa la fecha de lanzamiento primero');return;}

  // Leer días reales por fase
  const fases=['Diseño','Desarrollo','Implementacion','Lanzamiento'];
  const diasPorFase={};
  fases.forEach(f=>{
    const inp=document.getElementById(`dias-retro-${f}-${pid}`);
    const dEst=FD[f].tareas.reduce((s,t)=>s+(t.d||1),0);
    diasPorFase[f]=parseInt(inp?.value)||dEst;
  });

  // ── Calcular hacia atrás ──────────────────────────────────────────
  // Punto de partida: launchDate = fecha fin de la ÚLTIMA tarea de Lanzamiento
  // Retroceder fase por fase: Lanzamiento → Implementacion → Desarrollo → Diseño

  const fasesRev=[...fases].reverse(); // [Lanzamiento, Implementacion, Desarrollo, Diseño]
  let finFase=launchDate; // la fecha fin de la fase actual que estamos calculando

  fasesRev.forEach(fase=>{
    const tareas=FD[fase].tareas;
    const tps=p.tp[fase]||[];
    const nTareas=tareas.length;

    // Distribuir tareas de atrás hacia adelante dentro de la fase
    // La última tarea termina en finFase, la primera empieza nTareas*dPromedio días antes
    let curFin=finFase;

    // Recorrer tareas de atrás hacia adelante (última → primera)
    for(let i=nTareas-1;i>=0;i--){
      const dTarea=tareas[i]?.d||1;
      if(!tps[i]) continue;
      tps[i].ff=curFin;
      tps[i].fi=subWorkdays(curFin, dTarea-1);
      tps[i].diasReal=dTarea;
      if(tps[i].e==='No iniciado') tps[i].e='Completado';
      // La siguiente tarea hacia atrás termina el día antes que esta empieza
      if(i>0) curFin=subWorkdays(tps[i].fi, 1);
    }

    // El fin de la fase anterior = día antes que empieza la primera tarea de esta fase
    if(tps[0]?.fi) finFase=subWorkdays(tps[0].fi, 1);
  });

  // Fecha final = launchDate (la que ingresó el usuario)
  p.fechaFinal=launchDate;

  const totalReal=Object.values(diasPorFase).reduce((s,v)=>s+v,0);
  rcAvance(p);
  addAct(p,'retrodate',`Fechas históricas ← desde lanzamiento ${fmtD(launchDate)} · Total: ${totalReal}d`);
  saveProj(p);
  toast(`Fechas históricas aplicadas ✓ · ${totalReal} días hábiles registrados`);
  rModalKeepScroll('tareas');
}

// Función auxiliar: restar días hábiles hacia atrás
function subWorkdays(dateStr, days){
  if(!dateStr||days<=0) return dateStr;
  let d=new Date(dateStr+'T12:00:00');
  let subtracted=0;
  while(subtracted<days){
    d.setDate(d.getDate()-1);
    const dow=d.getDay();
    if(dow!==0&&dow!==6) subtracted++;
  }
  return d.toISOString().slice(0,10);
}

// ─── ACTUALIZAR FECHA CON CASCADA ─────────────────────────────────────
function uTFecha(pid,f,i,campo,val){
  const p=PROJ.find(x=>x.id===pid);if(!p||(!cE(p)&&!isG()))return;
  const t=(p.tp[f]||[])[i];if(!t)return;

  // Punto 2: fecha final del proyecto solo la puede mover el gerente
  const isLastTask=(f==='Lanzamiento'&&i===(p.tp['Lanzamiento']||[]).length-1&&campo==='ff');
  if(isLastTask&&!isG()){
    toast('⚠ La fecha final solo puede modificarla el Gerente de Innovación');
    rModalKeepScroll('tareas');return;
  }

  t[campo]=val;
  t._manual=true; // proteger de futuras cascadas

  if(campo==='ff'&&val){
    const dias=t.fi&&t.ff?workdaysBetween(t.fi,t.ff)+1:FD[f]?.tareas[i]?.d||1;
    t.diasReal=dias;
    let cur=addWorkdays(val,1);
    let pastThis=false;
    FK.forEach(fk=>{
      if(fk==='Seguimiento') return;
      (p.tp[fk]||[]).forEach((tk,j)=>{
        if(fk===f&&j===i){pastThis=true;return;}
        if(!pastThis) return;
        if(tk._manual){if(tk.ff) cur=addWorkdays(tk.ff,1);}
        else{const dEst=FD[fk]?.tareas[j]?.d||1;tk.fi=cur;tk.ff=addWorkdays(cur,dEst-1);tk.diasReal=dEst;cur=addWorkdays(tk.ff,1);}
      });
    });
    addAct(p,'fecha',`Fecha ajustada: ${f} tarea ${i+1}`);
  }

  if(campo==='fi'&&val&&!t.ff){
    const dEst=FD[f]?.tareas[i]?.d||1;
    t.ff=addWorkdays(val,dEst-1);
  }

  saveProj(p);
  // Refrescar preservando posición de scroll
  rModalKeepScroll('tareas');
}

// ─── (recalcularPendientes removido — flujo simplificado) ──────────
function recalcularPendientes(pid){
  const p=PROJ.find(x=>x.id===pid);if(!p||(!cE(p)&&!isG()))return;

  const hoyISO=toISO(TODAY);

  // Contar tareas pendientes (No iniciado / Bloqueado)
  let pendientes=0;
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    (p.tp[fk]||[]).forEach(t=>{
      if(t.e!=='Completado'&&t.e!=='En progreso') pendientes++;
    });
  });

  // El punto de partida SIEMPRE es hoy — sin importar las fechas viejas guardadas
  // Las tareas Completadas y En progreso se respetan en estatus pero NO mueven el cursor
  if(!confirm('Recalcular '+pendientes+' tareas pendientes desde hoy ('+fmtD(hoyISO)+')?\n\n- Las tareas Completadas y En progreso NO se tocan\n- Las No iniciadas se recalculan desde hoy con dias estandar\n- No modifica avance ni estatus.')) return;

  // Empezar cursor desde HOY
  let cur=hoyISO;
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    (p.tp[fk]||[]).forEach((t,j)=>{
      if(t.e==='Completado'||t.e==='En progreso'){
        // No tocar estas tareas — no mover cursor
        return;
      } else {
        // Tarea pendiente: recalcular desde cursor actual
        const dEst=FD[fk]?.tareas[j]?.d||1;
        t.fi=cur;
        t.ff=addWorkdays(cur,dEst-1);
        t.diasReal=dEst;
        delete t._manual;
        cur=addWorkdays(t.ff,1);
      }
    });
  });

  addAct(p,'fecha','Fechas pendientes recalculadas desde el punto de corte actual');
  saveProj(p);
  rModalKeepScroll('tareas');
  toast('✓ Fechas pendientes recalculadas con días estándar');
}

// ─── ACTUALIZAR FECHA FINAL (solo gerente) ────────────────────────────
function actualizarFechaFinal(pid, nuevaFecha){
  if(!isG()){toast('Solo el gerente puede modificar la fecha final');return;}
  if(!nuevaFecha){toast('Fecha inválida');return;}
  const p=PROJ.find(x=>x.id===pid);if(!p)return;

  const anteriorFecha=p.fechaFinal;
  const hoyISO=toISO(TODAY);

  // Contar tareas pendientes (no completadas, no en progreso)
  const pendientes=[];
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    (p.tp[fk]||[]).forEach((t,j)=>{
      if(t.e!=='Completado'&&t.e!=='En progreso') pendientes.push({fk,j,t});
    });
  });

  if(!pendientes.length){
    // Sin pendientes: solo actualizar fecha final
    p.fechaFinal=nuevaFecha;
    addAct(p,'fecha',`Fecha final ajustada: ${fmtD(anteriorFecha)} → ${fmtD(nuevaFecha)}`);
    saveProj(p);
    rModal();
    toast('Fecha final actualizada ✓');
    return;
  }

  // Distribuir tareas pendientes en el rango [hoy → nuevaFecha]
  // Si la nueva fecha es menor que hoy, varias pueden quedar el mismo día
  const totalDiasPendientes=pendientes.reduce((s,{fk,j})=>s+(FD[fk]?.tareas[j]?.d||1),0);
  const diasDisponibles=Math.max(workdaysBetween(hoyISO,nuevaFecha),1);

  // Factor de compresión (puede ser <1 si hay más días estándar que días disponibles)
  // En ese caso varias tareas compartirán el mismo día
  let cur=hoyISO;
  pendientes.forEach(({fk,j,t})=>{
    const dEst=FD[fk]?.tareas[j]?.d||1;
    // Días proporcionales: al menos 0 (misma fecha inicio y fin)
    const dProp=Math.max(Math.round(dEst/totalDiasPendientes*diasDisponibles)-1,0);
    t.fi=cur;
    t.ff=addWorkdays(cur,dProp);
    t.diasReal=dProp+1;
    delete t._manual;
    // Avanzar cursor solo si hay espacio
    if(addWorkdays(t.ff,1)<=nuevaFecha){
      cur=addWorkdays(t.ff,1);
    } else {
      cur=t.ff; // quedar en la fecha final
    }
  });

  // Asegurar que la última tarea termine exactamente en la nueva fecha final
  const ultima=pendientes[pendientes.length-1];
  if(ultima) ultima.t.ff=nuevaFecha;

  p.fechaFinal=nuevaFecha;
  addAct(p,'fecha',`Fecha final ajustada: ${fmtD(anteriorFecha)} → ${fmtD(nuevaFecha)} · ${pendientes.length} tareas redistribuidas`);
  saveProj(p);
  rModal();
  toast(`Fecha final: ${fmtD(nuevaFecha)} · ${pendientes.length} tareas redistribuidas ✓`);
}

// ─── UTILIDADES DE FECHAS HÁBILES ────────────────────────────────────
function addWorkdays(dateStr, days){
  if(!dateStr||days===0) return dateStr;
  let d=new Date(dateStr+'T12:00:00');
  let added=0;
  while(added<days){
    d.setDate(d.getDate()+1);
    const dow=d.getDay();
    if(dow!==0&&dow!==6) added++;
  }
  return d.toISOString().slice(0,10);
}
function workdaysBetween(s,e){
  if(!s||!e) return 0;
  let a=new Date(s+'T12:00:00'), b=new Date(e+'T12:00:00');
  if(a>b) return 0;
  let count=0;
  let cur=new Date(a);
  cur.setDate(cur.getDate()+1);
  while(cur<=b){
    const dow=cur.getDay();
    if(dow!==0&&dow!==6) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count;
}
function fmtDateInput(d){
  // format ISO date to DD/MM/YYYY for display
  if(!d) return '';
  const [y,m,dd]=d.split('-');
  return `${dd}/${m}/${y}`;
}

// ─── AUTOCOMPLETAR FECHAS DESDE BRIEF ────────────────────────────────
// Calcula fechas estándar para todas las tareas de todas las fases
// a partir de la fecha del brief (primera tarea de Diseño).
// Solo actualiza tareas que NO tienen fecha de inicio manual (fi==='').
// Seguimiento nunca se autocompleta (fechas variables).
function autoFechasDesde(p, briefDate, forceAll=false){
  let curDate = briefDate;
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return; // punto 4 — seguimiento siempre libre
    const tareas = FD[fk].tareas;
    (p.tp[fk]||[]).forEach((t,i)=>{
      const dias = tareas[i]?.d||1;
      const finEst = addWorkdays(curDate, dias);
      // Solo autocompletar si está vacío o si forceAll
      if(forceAll || !t.fi){
        t.fi = curDate;
        t.ff = finEst;
        t.diasEst = dias;
        if(!t.diasReal) t.diasReal = dias; // referencia estándar
      }
      // Avanzar: si tiene fecha fin real úsala, si no usa la estándar
      const finReal = t.ff || finEst;
      curDate = addWorkdays(finReal, 1);
    });
  });
  // Guardar fecha fin estimada por fase
  p.fechaFinFases = p.fechaFinFases||{};
  let cur2 = briefDate;
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    const tareas = p.tp[fk]||[];
    tareas.forEach(t=>{ if(t.ff) cur2=t.ff; });
    p.fechaFinFases[fk] = cur2;
  });
}

// Recalcula en cascada desde una tarea modificada en adelante
function recalcCascada(p, fromFase, fromIdx){
  // Encuentra la fecha de fin de la tarea anterior
  let prevFin = null;
  let pastFrom = false;
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    (p.tp[fk]||[]).forEach((t,i)=>{
      if(fk===fromFase && i===fromIdx){ pastFrom=true; prevFin=t.ff||null; return; }
      if(pastFrom && (!fk==='Seguimiento')){
        const dias = t.diasReal || FD[fk]?.tareas[i]?.d || 1;
        if(prevFin){
          t.fi = addWorkdays(prevFin,1);
          t.ff = addWorkdays(t.fi, dias-1>0?dias-1:dias);
          prevFin = t.ff;
        }
      }
    });
  });
  // Actualizar fechas de fin por fase
  p.fechaFinFases = p.fechaFinFases||{};
  FK.forEach(fk=>{
    if(fk==='Seguimiento') return;
    const tareas = p.tp[fk]||[];
    let lastFin = null;
    tareas.forEach(t=>{ if(t.ff) lastFin=t.ff; });
    if(lastFin) p.fechaFinFases[fk] = lastFin;
  });
}

// ─── INDICADORES NPD ─────────────────────────────────────────────────
function rIndicadores(c){
  const term=PROJ.filter(p=>p.estatus==='Terminado');
  const act=PROJ.filter(p=>p.estatus!=='Terminado'&&p.estatus!=='Cancelado');
  const todos=PROJ.filter(p=>p.estatus!=='Cancelado');

  // ── KPI 1: Cumplimiento de fechas ──
  const conFechas=term.filter(p=>p.fechaFinal&&p.tp['Lanzamiento']);
  const cumplieron=conFechas.filter(p=>{
    const lastFf=[...( p.tp['Lanzamiento']||[])].reverse().find(t=>t.ff)?.ff;
    if(!lastFf||!p.fechaFinal) return false;
    return lastFf<=p.fechaFinal;
  });
  const tasaCumplimiento=conFechas.length?Math.round(cumplieron.length/conFechas.length*100):null;

  // ── KPI 2: Tiempo promedio por fase ──
  const tiemposFases={};
  FK.filter(f=>f!=='Seguimiento').forEach(fk=>{
    const tiempos=[];
    term.forEach(p=>{
      const ts=p.tp[fk]||[];
      const firstFi=ts.find(t=>t.fi)?.fi;
      const lastFf=[...ts].reverse().find(t=>t.ff)?.ff;
      if(firstFi&&lastFf){const d=workdaysBetween(firstFi,lastFf)+1;if(d>0&&d<200)tiempos.push(d);}
    });
    tiemposFases[fk]={avg:tiempos.length?Math.round(tiempos.reduce((s,v)=>s+v,0)/tiempos.length):null,std:FD[fk].tareas.reduce((s,t)=>s+(t.d||1),0),n:tiempos.length};
  });

  // ── KPI 3: Tasa de reclamos post-lanzamiento ──
  const conSeg=term.filter(p=>(p.tp['Seguimiento']||[]).some(t=>t.e==='Completado'));
  const conReclamo=conSeg.filter(p=>{
    const t=(p.tp['Seguimiento']||[]).find(t=>t.n.includes('reclamos'));
    return t&&t.ref&&t.ref.trim().length>0;
  });
  const tasaReclamos=conSeg.length?Math.round(conReclamo.length/conSeg.length*100):null;

  // ── KPI 4: Proyectos activos vs capacidad ──
  const NOMBRES_ENG=NOMBRES;
  const porIng={};
  act.forEach(p=>{if(!porIng[p.eng])porIng[p.eng]=0;porIng[p.eng]++;});

  // ── KPI 5: Eficiencia del proceso (avance promedio activos) ──
  const avgAvance=act.length?Math.round(act.reduce((s,p)=>s+p.avance,0)/act.length):0;

  // ── KPI 6: Gates aprobados vs total ──
  const totalGates=todos.length*5;
  const gatesAprobados=todos.reduce((s,p)=>s+Object.values(p.gates||{}).filter(g=>g.aprobado).length,0);
  const tasaGates=totalGates?Math.round(gatesAprobados/totalGates*100):0;

  // ── KPI 7: Evidencias registradas ──
  let totalEv=0,evCon=0;
  todos.forEach(p=>{
    Object.values(p.gates||{}).forEach(g=>{
      (g.items||[]).forEach((_,i)=>{
        if(g.items[i]){totalEv++;if(g.evidencias?.[i]?.trim())evCon++;}
      });
    });
  });
  const tasaEvidencia=totalEv?Math.round(evCon/totalEv*100):0;

  c.innerHTML=`
  <!-- HEADER -->
  <div style="background:var(--navy);border-radius:var(--r2);padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
    <div>
      <div style="font-size:13px;font-weight:700;color:#fff">Panel de Indicadores NPD</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:1px">Línea Italia · ${todos.length} proyectos · ${term.length} terminados · Actualizado: ${new Date().toLocaleDateString('es-MX')}</div>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,.5)">Solo gerente</div>
  </div>

  <!-- KPIs principales -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px">
    ${[
      {l:'Cumplimiento\nde fechas',v:tasaCumplimiento!==null?tasaCumplimiento+'%':'Sin datos',s:`${cumplieron.length}/${conFechas.length} proyectos`,col:tasaCumplimiento===null?'var(--muted)':tasaCumplimiento>=80?'var(--ok)':tasaCumplimiento>=50?'var(--warn)':'var(--bad)',bg:tasaCumplimiento===null?'var(--surface2)':tasaCumplimiento>=80?'var(--ok-bg)':tasaCumplimiento>=50?'var(--warn-bg)':'var(--bad-bg)',note:'% proyectos terminados a tiempo'},
      {l:'Avance promedio\nproyectos activos',v:avgAvance+'%',s:`${act.length} proyectos activos`,col:bC(avgAvance),bg:'var(--surface2)',note:'Promedio de avance del equipo'},
      {l:'Gates aprobados\nvs. total',v:tasaGates+'%',s:`${gatesAprobados}/${totalGates} gates`,col:tasaGates>=60?'var(--ok)':tasaGates>=30?'var(--warn)':'var(--bad)',bg:'var(--surface2)',note:'Madurez del proceso NPD'},
      {l:'Evidencias\nregistradas',v:tasaEvidencia+'%',s:`${evCon}/${totalEv} ítems con ref.`,col:tasaEvidencia>=80?'var(--ok)':tasaEvidencia>=40?'var(--warn)':'var(--bad)',bg:'var(--surface2)',note:'% de gates con evidencia documentada'},
    ].map(k=>`<div style="background:${k.bg};border:1px solid var(--border2);border-radius:var(--r2);padding:14px;border-top:3px solid ${k.col}">
      <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:6px;line-height:1.3">${k.l}</div>
      <div style="font-size:26px;font-weight:800;font-family:var(--font-d);color:${k.col};line-height:1">${k.v}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${k.s}</div>
      <div style="font-size:9px;color:var(--muted);margin-top:2px;font-style:italic">${k.note}</div>
    </div>`).join('')}
  </div>

  <!-- Tiempo por fase: real vs estándar -->
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:16px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px">Tiempo real por fase vs. estándar</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:14px">Basado en ${term.length} proyectos terminados con fechas registradas. Verde = por debajo del estándar · Rojo = por encima.</div>
    ${FK.filter(f=>f!=='Seguimiento').map(f=>{
      const fd=FD[f];const {avg,std,n}=tiemposFases[f]||{avg:null,std:0,n:0};
      const diff=avg?avg-std:null;
      const pctBar=avg?Math.min(100,Math.round(avg/std*100)):0;
      const col=diff===null?'var(--muted)':diff<=0?'var(--ok)':'var(--bad)';
      return`<div style="display:grid;grid-template-columns:130px 1fr 90px 90px 90px;gap:8px;align-items:center;margin-bottom:8px">
        <span style="font-size:11px;font-weight:600;color:${fd.tc};background:${fd.bg};padding:2px 8px;border-radius:99px;text-align:center">${f}</span>
        <div style="position:relative">
          <div style="height:8px;background:var(--border2);border-radius:4px;overflow:hidden">
            <div style="height:100%;background:${col};width:${pctBar}%;border-radius:4px;transition:width .4s"></div>
          </div>
          ${avg?`<div style="position:absolute;left:${Math.min(92,Math.round(std/Math.max(avg,std)*100))}%;top:-3px;width:2px;height:14px;background:var(--navy);border-radius:1px" title="Estándar: ${std}d"></div>`:''}
        </div>
        <div style="text-align:center;font-size:11px;font-weight:700;color:${col}">${avg?avg+'d real':'—'}</div>
        <div style="text-align:center;font-size:11px;color:var(--muted)">${std}d est.</div>
        <div style="text-align:center;font-size:11px;font-weight:700;color:${col}">${diff===null?'—':diff===0?'En tiempo':diff>0?`+${diff}d`:`${diff}d`}</div>
      </div>`;
    }).join('')}
    <div style="font-size:10px;color:var(--muted);margin-top:6px">📌 La línea vertical en cada barra indica el estándar definido. N = proyectos con datos.</div>
  </div>

  <!-- Carga por ingeniero -->
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:16px;margin-bottom:14px">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:12px">Carga de proyectos activos por ingeniero</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px">
      ${Object.entries(porIng).map(([eng,n])=>{
        const u=USERS.find(x=>x.perfil===eng);
        const ec=ecOf(eng);
        const col=n<=2?'var(--ok)':n<=3?'var(--warn)':'var(--bad)';
        return`<div style="background:var(--surface2);border-radius:var(--r);padding:12px;border-left:3px solid ${col}">
          <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
            <div style="width:24px;height:24px;border-radius:50%;background:${ec.bg};color:${ec.tc};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${ec.init}</div>
            <div style="font-size:12px;font-weight:600;color:var(--text)">${u?.nombre||eng}</div>
          </div>
          <div style="font-size:22px;font-weight:800;font-family:var(--font-d);color:${col}">${n}</div>
          <div style="font-size:10px;color:var(--muted)">proyectos activos · ${n<=2?'Carga óptima':n===3?'Carga alta':'Sobrecarga'}</div>
        </div>`;
      }).join('')}
    </div>
  </div>

  <!-- Reclamos post-lanzamiento -->
  <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:16px">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:4px">Incidencias post-lanzamiento</div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Proyectos cuya tarea "Seguimiento a reclamos" tiene un folio de referencia registrado.</div>
    ${conSeg.length===0
      ?`<div style="padding:12px;background:var(--surface2);border-radius:var(--r);font-size:12px;color:var(--muted)">Sin proyectos con seguimiento completado aún.</div>`
      :`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        <div style="background:var(--bad-bg);border-radius:var(--r);padding:12px;text-align:center;border:1px solid rgba(217,53,53,.2)">
          <div style="font-size:24px;font-weight:800;font-family:var(--font-d);color:var(--bad)">${conReclamo.length}</div>
          <div style="font-size:10px;color:var(--bad)">Con incidencia</div>
        </div>
        <div style="background:var(--ok-bg);border-radius:var(--r);padding:12px;text-align:center;border:1px solid rgba(30,158,94,.2)">
          <div style="font-size:24px;font-weight:800;font-family:var(--font-d);color:var(--ok)">${conSeg.length-conReclamo.length}</div>
          <div style="font-size:10px;color:var(--ok)">Sin incidencia</div>
        </div>
        <div style="background:var(--surface2);border-radius:var(--r);padding:12px;text-align:center">
          <div style="font-size:24px;font-weight:800;font-family:var(--font-d);color:${tasaReclamos<=20?'var(--ok)':'var(--bad)'}">${tasaReclamos!==null?tasaReclamos+'%':'—'}</div>
          <div style="font-size:10px;color:var(--muted)">Tasa de incidencia</div>
        </div>
      </div>`}
    <div style="margin-top:10px;padding:10px;background:var(--surface2);border-radius:var(--r);font-size:11px;color:var(--muted)">
      💡 Para registrar incidencias: en la fase de Seguimiento, la tarea "Seguimiento a reclamos" tiene un campo de folio de referencia. Si hay reclamo, registra el folio ahí.
    </div>
  </div>`;
}

// ─── RE-RENDER MODAL PRESERVANDO SCROLL ──────────────────────────────
function rModalKeepScroll(tab){
  // .mbody es el contenedor con scroll del modal
  const mbody = document.querySelector('.mbody');
  const scrollY = mbody ? mbody.scrollTop : 0;

  rModal();
  sMT(tab||amt||'tareas');

  // Restaura el scroll tras el render
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      const mb2 = document.querySelector('.mbody');
      if(mb2) mb2.scrollTop = scrollY;
    });
  });
}
function guardarComentarioDesv(pid, f, i, val){
  const p=PROJ.find(x=>x.id===pid);if(!p)return;
  const t=(p.tp[f]||[])[i];if(!t)return;
  const prev=t.comentarioDesv||'';
  t.comentarioDesv=val.trim();
  if(val.trim()&&val.trim()!==prev){
    // Registrar también en las notas del proyecto como evidencia formal
    addAct(p,'desviacion',`Desviación en "${t.n}" (${f}): "${val.trim()}"`);
    if(!p.notas) p.notas=[];
    p.notas.push({
      fecha:new Date().toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit',year:'numeric'}),
      autor:cu?.nombre||'?',
      texto:`⚠ Desviación · ${f} · Tarea ${i+1}: "${t.n}" — ${val.trim()}`
    });
  }
  saveProj(p);
  toast('Razón registrada como evidencia ✓');
  rModalKeepScroll('tareas');
}

// ─── INIT ────────────────────────────────────────────────────────────
loadAll();
rLogin();
</script>
